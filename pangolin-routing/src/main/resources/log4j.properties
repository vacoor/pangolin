log4j.rootLogger = INFO, stdout, file
log4j.appender.stdout=org.apache.log4j.ConsoleAppender
log4j.appender.stdout.layout=org.apache.log4j.PatternLayout
# log4j.appender.stdout.layout.ConversionPattern=%d %5p (%40F\:%3L) - %m%n
log4j.appender.stdout.layout.ConversionPattern=%d %5p - %m%n

log4j.appender.file=org.apache.log4j.DailyRollingFileAppender
log4j.appender.file.File=logs/log.log
log4j.appender.file.DatePattern = '.'yyyy-MM-dd
log4j.appender.file.layout=org.apache.log4j.PatternLayout
log4j.appender.file.layout.ConversionPattern=%d %5p (%F\:%L) - %m%n
# log4j.appender.file.layout.ConversionPattern=%d %5p (%40F\:%3L) - %m%n

log4j.appender.mixin=org.apache.log4j.DailyRollingFileAppender
log4j.appender.mixin.File=logs/mxin.log
log4j.appender.mixin.DatePattern = '.'yyyy-MM-dd
log4j.appender.mixin.layout=org.apache.log4j.PatternLayout
log4j.appender.mixin.layout.ConversionPattern=%d %5p (%F\:%L) - %m%n
# log4j.appender.mixin.layout.ConversionPattern=%d %5p (%40F\:%3L) - %m%n

log4j.appender.tcp=org.apache.log4j.DailyRollingFileAppender
log4j.appender.tcp.File=logs/tcp.log
log4j.appender.tcp.DatePattern = '.'yyyy-MM-dd
log4j.appender.tcp.layout=org.apache.log4j.PatternLayout
log4j.appender.tcp.layout.ConversionPattern=%d %5p (%F\:%L) - %m%n

log4j.appender.dns=org.apache.log4j.DailyRollingFileAppender
log4j.appender.dns.File=logs/dns.log
log4j.appender.dns.DatePattern = '.'yyyy-MM-dd
log4j.appender.dns.layout=org.apache.log4j.PatternLayout
log4j.appender.dns.layout.ConversionPattern=%d %5p (%F\:%L) - %m%n
# log4j.appender.dns.layout.ConversionPattern=%d %5p (%40F\:%3L) - %m%n

# log4j.logger.com.sshtools = WARN
log4j.logger.com.github.pangolin.routing.acceptor.mixin = INFO, mixin
log4j.logger.com.github.pangolin.routing.acceptor.tun.net = INFO, tcp
log4j.logger.com.github.pangolin.routing.acceptor.tun.fakedns = INFO, dns

log4j.logger.io.netty = INFO
log4j.logger.com.github.pangolin = INFO
log4j.logger.com.github.pangolin.routing.acceptor.tun.net.handler.tcp = DEBUG
log4j.logger.com.netflix.loadbalancer.WeightedResponseTimeRule = WARN
log4j.logger.com.netflix.loadbalancer.DynamicServerListLoadBalancer = WARN
